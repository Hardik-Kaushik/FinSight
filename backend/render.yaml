services:
  - type: web
    name: finsight-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RULES_CONFIG_PATH
        value: rules_config
      - key: CORS_ORIGINS
        value: '["https://finsight-bay.vercel.app","http://localhost:3000"]'
